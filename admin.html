<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaFlow – Админ-панель</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Боковое меню -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-globe-americas"></i> LinguaFlow</h2>
                <span class="admin-badge">Администратор</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i> Дашборд
                </a>
                <a href="#" class="nav-item" data-page="users">
                    <i class="fas fa-users"></i> Пользователи
                </a>
                <a href="#" class="nav-item" data-page="achievements">
                    <i class="fas fa-trophy"></i> Управление достижениями
                </a>
                <a href="#" class="nav-item" id="logout-admin">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </a>
            </nav>
        </aside>

        <!-- Основной контент -->
        <main class="admin-main">
            <div class="admin-header">
                <h1 id="page-title">Панель управления</h1>
                <div class="admin-user-info">
                    <span id="admin-email"></span>
                </div>
            </div>
            <div class="admin-content" id="admin-content">
                <div class="loading">Загрузка...</div>
            </div>
        </main>
    </div>

    <!-- Модальное окно для просмотра деталей пользователя -->
    <div id="userModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>Информация о пользователе</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body" id="userModalBody">
                <!-- динамически -->
            </div>
        </div>
    </div>

    <!-- Модальное окно для редактирования достижения -->
    <div id="achievementModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="achModalTitle">Новое достижение</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="achForm">
                    <div class="form-group"><label>ID (уникальный)</label><input type="text" id="achId" required></div>
                    <div class="form-group"><label>Название</label><input type="text" id="achName" required></div>
                    <div class="form-group"><label>Описание</label><textarea id="achDesc" required></textarea></div>
                    <div class="form-group"><label>Категория</label><input type="text" id="achCategory"></div>
                    <div class="form-group"><label>Сложность (BRONZE/SILVER/GOLD/PLATINUM/DIAMOND)</label><input type="text" id="achDifficulty" value="BRONZE"></div>
                    <div class="form-group"><label>Иконка (FontAwesome)</label><input type="text" id="achIcon" value="trophy"></div>
                    <div class="form-group"><label>Очки</label><input type="number" id="achPoints" value="10"></div>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Import map для Firebase -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"
            }
        }
    </script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
